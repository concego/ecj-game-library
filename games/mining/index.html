<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ECJ — Mineração ⛏️</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: #1a1008;
      color: #e0d8c0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .sr-only {
      position: absolute;
      width: 1px; height: 1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
    }
    h1 { font-size: 1.4rem; margin-bottom: 0.5rem; text-align: center; }
    #score-area { display: flex; gap: 2rem; margin-bottom: 1rem; font-size: 1rem; }
    #state-label {
      font-size: 1.1rem; font-weight: bold;
      text-align: center; min-height: 2rem; margin-bottom: 0.5rem;
    }
    #hint-area {
      font-size: 3.5rem; text-align: center;
      min-height: 4.5rem; margin-bottom: 0.8rem;
    }
    #progress-container {
      width: 100%; max-width: 360px; height: 20px;
      background: #2a1f0a; border-radius: 10px; overflow: hidden; margin-bottom: 1rem;
    }
    #progress-bar {
      height: 100%; width: 0%;
      background: #f9a825;
      border-radius: 10px;
      transition: width 0.15s;
    }
    #instructions {
      font-size: 0.85rem; color: #999;
      text-align: center; margin-bottom: 1rem; max-width: 320px;
    }
    button {
      margin-top: 1rem; padding: 0.9rem 2.5rem; font-size: 1.1rem;
      border-radius: 8px; background: #5d4037; color: #fff; border: none; cursor: pointer;
    }
    button:focus { outline: 3px solid #f9a825; }
    #btn-back {
      background: none; color: #f9a825;
      font-size: 1rem; text-decoration: underline; margin-top: 0.5rem;
    }
  </style>
</head>
<body>
  <div id="announcer" class="sr-only" aria-live="assertive" aria-atomic="true"></div>
  <h1>⛏️ Mineração — ECJ</h1>
  <div id="score-area" aria-label="Pontuação">
    <span>Minérios: <strong id="score">0</strong></span>
    <span>Recorde: <strong id="best">0</strong></span>
  </div>
  <div id="state-label" aria-live="polite">Pressione Iniciar</div>
  <div id="hint-area" aria-hidden="true">⛏️</div>
  <div id="progress-container"
       role="progressbar" aria-label="Progresso da mineração"
       aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
    <div id="progress-bar"></div>
  </div>
  <div id="instructions">
    Siga o ritmo: incline para frente e para trás conforme a seta.<br>
    Desktop: ↑ e ↓ para minerar.
  </div>
  <button id="btn-start">▶ Iniciar</button>
  <button id="btn-back" onclick="history.back()">← Voltar ao menu</button>

  <script type="module" src="game.js"></script>
</body>
</html>
